name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 3 * * *"   # 3:30 AM UTC (after midnight ET)
    - cron: "30 8 * * *"   # 8:30 AM UTC (backup)
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SITE_URL: https://wordlehint.info
      NEXT_PUBLIC_GOOGLE_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ID }}
      NEXT_PUBLIC_GOOGLE_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ADSENSE_ID }}
      NEXT_PUBLIC_BAIDU_TONGJI: ${{ secrets.NEXT_PUBLIC_BAIDU_TONGJI }}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
      NEXT_PUBLIC_PLAUSIBLE_SRC: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_SRC }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Wordle data
        run: pnpm run update:wordle

      - name: Commit updated data
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wordle-daily.json
          git diff --staged --quiet || git commit -m "chore: update daily Wordle data"
          git push

      - name: Build and deploy with OpenNext
        run: pnpm run deploy
