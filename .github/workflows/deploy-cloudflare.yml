name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 3 * * *"   # 3:30 AM UTC (after midnight ET)
    - cron: "30 8 * * *"   # 8:30 AM UTC (backup)
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SITE_URL: https://wordlehint.info
      NEXT_PUBLIC_GOOGLE_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ID }}
      NEXT_PUBLIC_GOOGLE_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ADSENSE_ID }}
      NEXT_PUBLIC_BAIDU_TONGJI: ${{ secrets.NEXT_PUBLIC_BAIDU_TONGJI }}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
      NEXT_PUBLIC_PLAUSIBLE_SRC: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_SRC }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup pnpm
        run: |
          node --version
          corepack enable
          corepack prepare pnpm@10.12.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Wordle data
        run: pnpm run update:wordle

      - name: Update Connections data
        run: pnpm run update:connections
        continue-on-error: true

      - name: Update Strands data
        run: pnpm run update:strands
        continue-on-error: true

      - name: Update Spelling Bee data
        run: pnpm run update:spelling-bee
        continue-on-error: true

      - name: Fetch definitions for new answers
        run: node scripts/generate-definitions.mjs

      - name: Commit updated data
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wordle-daily.json data/wordle-definitions.json data/connections-daily.json data/strands-daily.json data/spelling-bee-daily.json
          git diff --staged --quiet || git commit -m "chore: update daily puzzle data"
          # Checkout step uses `git checkout FETCH_HEAD` (detached HEAD), so an
          # argless `git push` fails with "not currently on a branch". Push the
          # current HEAD explicitly to main.
          git push origin HEAD:main

      - name: Build and deploy with OpenNext
        run: pnpm run deploy
