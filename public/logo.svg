<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#1e293b"/>

  <!-- Letter grid dots (4x4 simplified grid) -->
  <g fill="#475569">
    <circle cx="136" cy="120" r="12"/>
    <circle cx="216" cy="120" r="12"/>
    <circle cx="296" cy="120" r="12"/>
    <circle cx="376" cy="120" r="12"/>
    <circle cx="136" cy="200" r="12"/>
    <circle cx="216" cy="200" r="12"/>
    <circle cx="296" cy="200" r="12"/>
    <circle cx="376" cy="200" r="12"/>
    <circle cx="136" cy="280" r="12"/>
    <circle cx="216" cy="280" r="12"/>
    <circle cx="296" cy="280" r="12"/>
    <circle cx="376" cy="280" r="12"/>
    <circle cx="136" cy="360" r="12"/>
    <circle cx="216" cy="360" r="12"/>
    <circle cx="296" cy="360" r="12"/>
    <circle cx="376" cy="360" r="12"/>
  </g>

  <!-- Spangram path (gold) - spans across the grid diagonally -->
  <polyline
    points="136,120 216,200 296,200 376,280"
    stroke="#f59e0b"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
  />

  <!-- Theme word path (blue) -->
  <polyline
    points="136,280 216,360 296,360"
    stroke="#3b82f6"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
  />

  <!-- Highlighted dots on spangram path (gold) -->
  <g fill="#f59e0b">
    <circle cx="136" cy="120" r="18"/>
    <circle cx="216" cy="200" r="18"/>
    <circle cx="296" cy="200" r="18"/>
    <circle cx="376" cy="280" r="18"/>
  </g>

  <!-- Highlighted dots on theme word path (blue) -->
  <g fill="#3b82f6">
    <circle cx="136" cy="280" r="18"/>
    <circle cx="216" cy="360" r="18"/>
    <circle cx="296" cy="360" r="18"/>
  </g>

  <!-- Letters on spangram dots (white on gold) -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" text-anchor="middle" dominant-baseline="central" fill="white">
    <text x="136" y="122">S</text>
    <text x="216" y="202">T</text>
    <text x="296" y="202">R</text>
    <text x="376" y="282">A</text>
  </g>

  <!-- Letters on theme word dots (white on blue) -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" text-anchor="middle" dominant-baseline="central" fill="white">
    <text x="136" y="282">H</text>
    <text x="216" y="362">I</text>
    <text x="296" y="362">N</text>
  </g>

  <!-- Faint letters on non-highlighted dots -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" text-anchor="middle" dominant-baseline="central" fill="#64748b">
    <text x="216" y="122">O</text>
    <text x="296" y="122">K</text>
    <text x="376" y="122">D</text>
    <text x="136" y="202">N</text>
    <text x="376" y="202">S</text>
    <text x="216" y="282">W</text>
    <text x="296" y="282">T</text>
    <text x="136" y="362">E</text>
    <text x="376" y="362">P</text>
  </g>
</svg>
