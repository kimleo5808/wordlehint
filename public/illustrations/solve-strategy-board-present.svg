<svg width="300" height="360" viewBox="0 0 300 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mini Wordle board showing a yellow letter moving to a new column and turning green">
  <style>
    .out { fill: none; stroke: currentColor; stroke-width: 2; opacity: 0.45; }
    .g { fill: currentColor; font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 700; font-size: 26px; }
    .lbl { fill: currentColor; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; opacity: 0.6; }
  </style>
  <!-- Row 1: ADIEU — A yellow in slot 1 (in the word, wrong spot), rest gray -->
  <g>
    <rect x="12" y="12" width="48" height="48" rx="8" fill="#c9b458"/><text x="36" y="46" text-anchor="middle" class="g" fill="#fff">A</text>
    <rect x="66" y="12" width="48" height="48" rx="8" fill="#787c7e"/><text x="90" y="46" text-anchor="middle" class="g" fill="#fff">D</text>
    <rect x="120" y="12" width="48" height="48" rx="8" fill="#787c7e"/><text x="144" y="46" text-anchor="middle" class="g" fill="#fff">I</text>
    <rect x="174" y="12" width="48" height="48" rx="8" fill="#787c7e"/><text x="198" y="46" text-anchor="middle" class="g" fill="#fff">E</text>
    <rect x="228" y="12" width="48" height="48" rx="8" fill="#787c7e"/><text x="252" y="46" text-anchor="middle" class="g" fill="#fff">U</text>
  </g>
  <!-- Arrow: A slides from slot 1 toward slot 3 -->
  <g opacity="0.55">
    <path d="M36 66 C 36 80, 144 80, 144 66" stroke="#c9b458" stroke-width="2.5" fill="none" stroke-dasharray="4 4"/>
    <path d="M140 68 l4 4 4 -4" stroke="#c9b458" stroke-width="2.5" fill="none"/>
  </g>
  <!-- Row 2: CRANE — A green in slot 3 (right spot now), E green -->
  <g>
    <rect x="12" y="84" width="48" height="48" rx="8" fill="#787c7e"/><text x="36" y="118" text-anchor="middle" class="g" fill="#fff">C</text>
    <rect x="66" y="84" width="48" height="48" rx="8" fill="#787c7e"/><text x="90" y="118" text-anchor="middle" class="g" fill="#fff">R</text>
    <rect x="120" y="84" width="48" height="48" rx="8" fill="#6aaa64"/><text x="144" y="118" text-anchor="middle" class="g" fill="#fff">A</text>
    <rect x="174" y="84" width="48" height="48" rx="8" fill="#787c7e"/><text x="198" y="118" text-anchor="middle" class="g" fill="#fff">N</text>
    <rect x="228" y="84" width="48" height="48" rx="8" fill="#6aaa64"/><text x="252" y="118" text-anchor="middle" class="g" fill="#fff">E</text>
  </g>
  <!-- Row 3: empty outlines -->
  <rect x="12" y="144" width="48" height="48" rx="8" class="out"/><rect x="66" y="144" width="48" height="48" rx="8" class="out"/><rect x="120" y="144" width="48" height="48" rx="8" class="out"/><rect x="174" y="144" width="48" height="48" rx="8" class="out"/><rect x="228" y="144" width="48" height="48" rx="8" class="out"/>
  <rect x="12" y="204" width="48" height="48" rx="8" class="out"/><rect x="66" y="204" width="48" height="48" rx="8" class="out"/><rect x="120" y="204" width="48" height="48" rx="8" class="out"/><rect x="174" y="204" width="48" height="48" rx="8" class="out"/><rect x="228" y="204" width="48" height="48" rx="8" class="out"/>
  <!-- caption -->
  <text x="12" y="288" class="lbl">A yellow letter is right — wrong slot.</text>
  <text x="12" y="308" class="lbl">Move it to its likeliest position next.</text>
  <!-- legend tiles -->
  <rect x="12" y="324" width="20" height="20" rx="5" fill="#6aaa64"/>
  <rect x="40" y="324" width="20" height="20" rx="5" fill="#c9b458"/>
  <rect x="68" y="324" width="20" height="20" rx="5" fill="#787c7e"/>
</svg>
