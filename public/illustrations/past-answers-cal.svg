<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Calendar tile marking past Wordle answers">
  <style>.s { stroke: currentColor; stroke-width: 2.5; fill: none; }</style>
  <!-- calendar body as a tile -->
  <rect x="12" y="20" width="72" height="64" rx="10" class="s" fill="#ffffff" fill-opacity="0.02"/>
  <!-- header band -->
  <path d="M12 34 a10 10 0 0 1 10 -14 h52 a10 10 0 0 1 10 14 Z" fill="#6aaa64"/>
  <!-- rings -->
  <line x1="32" y1="10" x2="32" y2="26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="10" x2="64" y2="26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- date grid dots -->
  <g fill="currentColor" opacity="0.5">
    <circle cx="30" cy="48" r="3"/><circle cx="48" cy="48" r="3"/><circle cx="66" cy="48" r="3"/>
    <circle cx="30" cy="64" r="3"/><circle cx="66" cy="64" r="3"/>
  </g>
  <!-- highlighted answer day (yellow) -->
  <rect x="42" y="58" width="12" height="12" rx="3" fill="#c9b458"/>
  <!-- check mark on header -->
  <path d="M40 28 l5 5 l11 -11" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
